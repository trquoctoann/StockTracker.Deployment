# Usage:
#   docker compose up -d            # Start all services
#   docker compose logs -f api      # Follow API logs
#   docker compose down             # Stop all services
#   docker compose down -v          # Stop + remove volumes (DESTRUCTIVE)

services:
  postgres:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend

  redis:
    image: redis:8-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: ${COMPOSE_PROJECT_NAME}-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: ${KC_DB}
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT}
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED}
      KC_HEALTH_ENABLED: ${KC_HEALTH_ENABLED}
    ports:
      - "8080:8080"
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - backend

  api:
    build:
      context: ../StockTracker.API
      dockerfile: ../StockTracker.Deployment/services/api/Dockerfile
    image: ${DOCKER_API_REPO:-stocktracker-api}:${API_APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME}-api
    restart: unless-stopped
    environment:
      APP_NAME: ${API_APP_NAME}
      APP_VERSION: ${API_APP_VERSION}
      DEBUG: ${API_DEBUG}
      ENVIRONMENT: ${API_ENVIRONMENT}
      SERVICE_NAME: ${API_SERVICE_NAME}
      LOG_LEVEL: ${API_LOG_LEVEL}
      LOG_JSON: ${API_LOG_JSON}
      LOG_SQL: ${API_LOG_SQL}
      DATABASE_URL: ${API_DATABASE_URL}
      DATABASE_POOL_PRE_PING: ${API_DATABASE_POOL_PRE_PING}
      DATABASE_POOL_SIZE: ${API_DATABASE_POOL_SIZE}
      DATABASE_MAX_OVERFLOW: ${API_DATABASE_MAX_OVERFLOW}
      ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS}
      DEFAULT_PAGE_SIZE: ${API_DEFAULT_PAGE_SIZE}
      MAX_PAGE_SIZE: ${API_MAX_PAGE_SIZE}
      DEFAULT_LOCALE: ${API_DEFAULT_LOCALE}
      SUPPORTED_LOCALES: ${API_SUPPORTED_LOCALES}
      OIDC_KEYCLOAK_SERVER_URL: ${API_OIDC_KEYCLOAK_SERVER_URL}
      OIDC_KEYCLOAK_REALM: ${API_OIDC_KEYCLOAK_REALM}
      OIDC_KEYCLOAK_CLIENT_ID: ${API_OIDC_KEYCLOAK_CLIENT_ID}
      OIDC_KEYCLOAK_CLIENT_SECRET: ${API_OIDC_KEYCLOAK_CLIENT_SECRET}
      OIDC_KEYCLOAK_ADMIN_USERNAME: ${API_OIDC_KEYCLOAK_ADMIN_USERNAME}
      OIDC_KEYCLOAK_ADMIN_PASSWORD: ${API_OIDC_KEYCLOAK_ADMIN_PASSWORD}
      OIDC_KEYCLOAK_VERIFY_TLS: ${API_OIDC_KEYCLOAK_VERIFY_TLS}
      AUTH_CONTEXT_TOKEN_SECRET: ${API_AUTH_CONTEXT_TOKEN_SECRET}
      AUTH_CONTEXT_TOKEN_ALGORITHM: ${API_AUTH_CONTEXT_TOKEN_ALGORITHM}
      AUTH_CONTEXT_TOKEN_TTL_SECONDS: ${API_AUTH_CONTEXT_TOKEN_TTL_SECONDS}
      AUTH_CONTEXT_TOKEN_ISSUER: ${API_AUTH_CONTEXT_TOKEN_ISSUER}
      REDIS_ENABLED: ${API_REDIS_ENABLED}
      REDIS_URL: ${API_REDIS_URL}
      REDIS_MAX_CONNECTIONS: ${API_REDIS_MAX_CONNECTIONS}
      REDIS_SOCKET_CONNECT_TIMEOUT: ${API_REDIS_SOCKET_CONNECT_TIMEOUT}
      REDIS_SOCKET_TIMEOUT: ${API_REDIS_SOCKET_TIMEOUT}
      REDIS_KEY_PREFIX: ${API_REDIS_KEY_PREFIX}
      REDIS_KEY_SERVICE_PREFIX: ${API_REDIS_KEY_SERVICE_PREFIX}
      REDIS_DEFAULT_TTL_SECONDS: ${API_REDIS_DEFAULT_TTL_SECONDS}
      REDIS_CIRCUIT_BREAKER_SECONDS: ${API_REDIS_CIRCUIT_BREAKER_SECONDS}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend
    labels:
      logging: "true"

  loki:
    image: grafana/loki:3.7.1
    container_name: ${COMPOSE_PROJECT_NAME}-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:v1.15.0
    container_name: ${COMPOSE_PROJECT_NAME}-alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - monitoring
      - backend

  grafana:
    image: grafana/grafana:12.4.2
    container_name: ${COMPOSE_PROJECT_NAME}-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3000/api/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - monitoring

networks:
  backend:
    name: ${COMPOSE_PROJECT_NAME}-backend
    driver: bridge
  monitoring:
    name: ${COMPOSE_PROJECT_NAME}-monitoring
    driver: bridge

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME}-postgres-data
  redis_data:
    name: ${COMPOSE_PROJECT_NAME}-redis-data
  loki_data:
    name: ${COMPOSE_PROJECT_NAME}-loki-data
  alloy_data:
    name: ${COMPOSE_PROJECT_NAME}-alloy-data
  grafana_data:
    name: ${COMPOSE_PROJECT_NAME}-grafana-data
