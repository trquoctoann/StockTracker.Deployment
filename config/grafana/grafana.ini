[server]
protocol = http
http_port = 3000
root_url = http://localhost:3000

[security]
cookie_secure = false
cookie_samesite = lax

[users]
allow_sign_up = false
allow_org_create = false

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/docker-logs.json

[log]
mode = console
level = warn

[log.console]
format = json

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[feature_toggles]
enable = nestedFolders
